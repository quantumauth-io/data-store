  postgres:
    image: postgres:16
    container_name: qa-postgres
    environment:
      POSTGRES_USER: qa
      POSTGRES_PASSWORD: qa
      POSTGRES_DB: qa_dev
    ports:
      - "5432:5432"
    volumes:
      - qa_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U qa -d qa_dev" ]
      interval: 5s
      timeout: 3s
      retries: 20

networks:
  default:
    name: quantumauth-network
    external: true