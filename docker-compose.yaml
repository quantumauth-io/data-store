volumes:
  cockroachdb-data:

services:
  cockroachdb:
    image: cockroachdb/cockroach:v25.2.0
    ports:
      - '26257:26257'
      - '18080:18080'
    entrypoint: /opt/cockroachdb/startup.sh
    volumes:
      - cockroachdb-data:/cockroach/cockroach-data
      - ./cockroachdb:/opt/cockroachdb
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  default:
    name: quantumauth-network
    external: true