version: '3.6'

volumes:
  cockroachdb-data:

services:
  # crdb section
  cockroachdb:
    image: 'cockroachdb/cockroach:v22.2.2'
    ports:
      - '26257:26257'
      - '18080:18080'
    entrypoint: '/opt/cockroachdb/startup.sh'
    volumes:
      - 'cockroachdb-data:/cockroach/cockroach-data'
      - './cockroachdb:/opt/cockroachdb'
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
networks:
  default:
    name: mid-network
    external: true

