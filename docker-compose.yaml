version: '3.6'

volumes:
  cockroachdb-data:
  mongodb-data:
  vault-data:

services:
  # crdb section
  cockroachdb:
    image: 'cockroachdb/cockroach:v22.2.2'
    ports:
      - '26257:26257'
      - '18080:18080'
    entrypoint: '/opt/cockroachdb/startup.sh'
    volumes:
      - 'cockroachdb-data:/cockroach/cockroach-data'
      - './cockroachdb:/opt/cockroachdb'
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
  # hardhat section
  hardhat-node:
    image: 'hardhat'
    build:
      context: ./hardhat
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
  # MongoDB section
  mongodb:
    image: 'mongo:latest'
    ports:
      - '27017:27017'
    volumes:
      - 'mongodb-data:/data/db'
    restart: always
      # Additional configuration can be added here
  # Vault section
  vault:
    image: vault:1.13.3
    ports:
      - "8200:8200"
    volumes:
      - 'vault-data:/vault/file'
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: a_root_token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    entrypoint: vault server -dev -dev-root-token-id="a_root_token"


networks:
  default:
    name: idecentralize-network
    external: true


